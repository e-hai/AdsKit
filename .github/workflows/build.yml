name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify SDK publish (JitPack simulation)
        run: >
          ./gradlew publishToMavenLocal
          -Pgroup=com.github.ci
          -Pversion=0.0.0-ci
          --no-daemon

      - name: Verify slim provider artifacts
        run: |
          BASE="$HOME/.m2/repository/com/github/ci"
          for artifact in AdsKit-core AdsKit-admob AdsKit-applovin AdsKit; do
            test -f "$BASE/$artifact/0.0.0-ci/$artifact-0.0.0-ci.aar" \
              || (echo "Missing $artifact AAR" && exit 1)
          done
          echo "All publishable artifacts present"

      - name: Run unit tests
        run: ./gradlew :ads-core:testDebugUnitTest --no-daemon

      - name: Build sample app
        run: ./gradlew :sample:assembleDebug --no-daemon

      - name: Check artifact size limits
        run: |
          chmod +x scripts/check-artifact-sizes.sh
          ./scripts/check-artifact-sizes.sh com.github.ci 0.0.0-ci
